; Connected Weather Station — PlatformIO Configuration
; ESP32 + BME280 + BH1750 + HTTPS API

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Enable Arduino OTA for wireless updates
upload_protocol = esptool

lib_deps =
    adafruit/Adafruit BME280 Library@^2.2.4
    claws/BH1750@^1.3.0
    bblanchon/ArduinoJson@^7.0.0

; Build flags for HTTPS support
build_flags =
    -DCORE_DEBUG_LEVEL=3
