# ============================================================
#  Docker Compose — Full Stack (PostgreSQL + FastAPI + React)
#  Run: docker compose up --build
# ============================================================

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: weather_station
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend ----
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@db:5432/weather_station
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost"]'
    ports:
      - "8000:8000"

  # ---- React Frontend ----
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
